name: OpenWrt Builder (Docker)

on:
  workflow_dispatch:      # 手动触发
  repository_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai
  CCACHE_SIZE: 4G

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Maximize Runner Space
        uses: easimon/maximize-build-space@v10   # 可选，释放更多空间
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Build OpenWrt in Docker
        run: |
          docker run --rm -v "$(pwd)":/workspace \
            -e REPO_URL=${{ env.REPO_URL }} \
            -e REPO_BRANCH=${{ env.REPO_BRANCH }} \
            -e TZ=${{ env.TZ }} \
            -e CCACHE_SIZE=${{ env.CCACHE_SIZE }} \
            ghcr.io/openwrt/docker/buildroot:latest \
            bash -c '
              set -e
              cd /workspace
              
              # 如果需要自定义 feeds 或 diy 脚本，可以在这里执行
              [ -f diy-part1.sh ] && chmod +x diy-part1.sh && ./diy-part1.sh || true
              
              git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
              cd openwrt
              
              [ -f ../feeds.conf.default ] && cp ../feeds.conf.default . || true
              [ -f ../.config ] && cp ../.config . || true
              
              ./scripts/feeds update -a
              ./scripts/feeds install -a
              
              [ -f ../diy-part2.sh ] && chmod +x ../diy-part2.sh && ../diy-part2.sh || true
              
              make defconfig
              
              # 可选：预下载（加速后续编译）
              make download -j$(nproc) || true
              
              # 编译（推荐先用 -j1 测试，正式用多线程）
              make -j$(nproc) || make -j1 V=s
              
              # 整理输出
              mkdir -p /workspace/firmware
              cp -r bin/targets/*/* /workspace/firmware/ 2>/dev/null || true
              echo "Build completed. Firmware in /workspace/firmware"
            '

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-25.12-firmware
          path: ./firmware/
          retention-days: 7
          compression-level: 6

      - name: Cleanup Old Releases (可选)
        if: env.UPLOAD_RELEASE == 'true'
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
